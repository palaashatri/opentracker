# Spring profile: mock
# Activated via SPRING_PROFILES_ACTIVE=mock
# Forces all feeds to mock and disables real satellite TLE fetching.

ingestion:
  feed:
    flight: mock
    ship: mock
  satellite:
    enabled: false

mock:
  seed: ${MOCK_SEED:42}
  flights-count: ${MOCK_FLIGHTS_COUNT:500}
  ships-count: ${MOCK_SHIPS_COUNT:200}
  satellites-count: ${MOCK_SATELLITES_COUNT:100}
