server:
  port: 8080
  tomcat:
    threads:
      max: 400
      min-spare: 50

spring:
  application:
    name: gateway
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: gateway-sse
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

gateway:
  geospatial-url: ${GATEWAY_GEOSPATIAL_URL:http://localhost:8083}
  api-key: ${GATEWAY_API_KEY:dev-key}
  cors:
    allowed-origins: ${GATEWAY_CORS_ORIGINS:http://localhost:4200,http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
