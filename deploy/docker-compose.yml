services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: dt-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: dt-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: dt-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: digitaltwin
      POSTGRES_USER: dt_user
      POSTGRES_PASSWORD: dt_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dt_user -d digitaltwin"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: dt-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build:
      context: ..
      dockerfile: backend/ingestion/Dockerfile
    container_name: dt-ingestion
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INGESTION_FEED_FLIGHT: ${INGESTION_FEED_FLIGHT:-mock}
      INGESTION_FEED_SHIP: ${INGESTION_FEED_SHIP:-mock}
      INGESTION_SIM_AIRCRAFT: ${INGESTION_SIM_AIRCRAFT:-500}
      INGESTION_SIM_VESSELS: ${INGESTION_SIM_VESSELS:-200}
      INGESTION_SIM_INTERVAL_MS: ${INGESTION_SIM_INTERVAL_MS:-1000}
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY:-}
      OPENSKY_USERNAME: ${OPENSKY_USERNAME:-}
      OPENSKY_PASSWORD: ${OPENSKY_PASSWORD:-}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-dev-key}
    ports:
      - "8081:8081"
    restart: on-failure

  stream-processor:
    build:
      context: ..
      dockerfile: backend/stream-processor/Dockerfile
    container_name: dt-stream-processor
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitaltwin
      SPRING_DATASOURCE_USERNAME: dt_user
      SPRING_DATASOURCE_PASSWORD: dt_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
    ports:
      - "8082:8082"
    restart: on-failure

  geospatial:
    build:
      context: ..
      dockerfile: backend/geospatial/Dockerfile
    container_name: dt-geospatial
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/digitaltwin
      SPRING_DATASOURCE_USERNAME: dt_user
      SPRING_DATASOURCE_PASSWORD: dt_pass
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
    ports:
      - "8083:8083"
    restart: on-failure

  gateway:
    build:
      context: ..
      dockerfile: backend/gateway/Dockerfile
    container_name: dt-gateway
    depends_on:
      kafka:
        condition: service_healthy
      geospatial:
        condition: service_started
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GATEWAY_GEOSPATIAL_URL: http://geospatial:8083
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-dev-key}
      GATEWAY_CORS_ORIGINS: http://localhost:4200,http://frontend:80
    ports:
      - "8080:8080"
    restart: on-failure

  frontend:
    build:
      context: ../frontend/digital-twin-earth-app
      dockerfile: Dockerfile
    container_name: dt-frontend
    depends_on:
      - gateway
    ports:
      - "4200:80"
    restart: on-failure

volumes:
  pgdata:
    driver: local
