<div class="stats-panel" aria-label="Live tracking statistics">

  <header class="stats-header">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
      <path d="M1 9L4 5L7 7L11 2" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="11" cy="2" r="1" fill="rgba(255,255,255,0.5)"/>
    </svg>
    <span class="stats-title">Live Tracking</span>

    <div class="live-badge" [class.live-badge--active]="connectionStatus === 'connected'" aria-label="Stream status">
      <span class="live-dot" aria-hidden="true"></span>
      <span>{{ uptimeLabel }}</span>
    </div>
  </header>

  <!-- Primary stat: total -->
  <div class="stat-total">
    <span class="stat-total-number">{{ totalEntities | number }}</span>
    <span class="stat-total-label">entities tracked</span>
  </div>

  <!-- Breakdown -->
  <div class="stat-grid">

    <!-- Flights -->
    <div class="stat-card stat-card--flights">
      <div class="stat-card-icon" aria-hidden="true">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
          <path d="M1 10L5 7L6.5 4C6.5 4 7.5 1.5 9.5 2C11 2.5 10.5 4.5 10.5 4.5L8.5 6.5H13C13 6.5 14.5 6 15 7C15.5 8 14 8.5 14 8.5H9L7.5 10.5H10C10 10.5 11 10.5 11 11.5C11 12.5 10 12.5 10 12.5H4.5L2 12.5L1 10Z"
                fill="currentColor"/>
        </svg>
      </div>
      <div class="stat-card-value">{{ flightCount | number }}</div>
      <div class="stat-card-label">Aircraft</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill"
             [style.width.%]="totalEntities > 0 ? (flightCount / totalEntities * 100) : 0">
        </div>
      </div>
    </div>

    <!-- Vessels -->
    <div class="stat-card stat-card--ships">
      <div class="stat-card-icon" aria-hidden="true">
        <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
          <path d="M2 8.5L8 5L14 8.5V11C14 11.6 13.4 12 13 12H3C2.6 12 2 11.6 2 11V8.5Z" fill="currentColor" opacity="0.85"/>
          <path d="M6 5V3H10V5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="8" y1="1" x2="8" y2="3" stroke="currentColor" stroke-width="1.3"/>
          <path d="M0.5 12.5C3 14 5.5 12.5 8 12.5C10.5 12.5 13 14 15.5 12.5"
                stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>
      <div class="stat-card-value">{{ shipCount | number }}</div>
      <div class="stat-card-label">Vessels</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill"
             [style.width.%]="totalEntities > 0 ? (shipCount / totalEntities * 100) : 0">
        </div>
      </div>
    </div>

    <!-- Satellites -->
    <div class="stat-card stat-card--satellites">
      <div class="stat-card-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" fill="currentColor"/>
          <line x1="8" y1="1" x2="8" y2="5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="8" y1="11" x2="8" y2="15" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="1" y1="8" x2="5" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="11" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <line x1="3" y1="3" x2="5.5" y2="5.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
          <line x1="10.5" y1="10.5" x2="13" y2="13" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        </svg>
      </div>
      <div class="stat-card-value">{{ satelliteCount | number }}</div>
      <div class="stat-card-label">Satellites</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill"
             [style.width.%]="totalEntities > 0 ? (satelliteCount / totalEntities * 100) : 0">
        </div>
      </div>
    </div>

  </div>

  <!-- Last updated timestamp -->
  @if (lastUpdated) {
    <p class="last-updated">
      Updated {{ lastUpdated | date:'HH:mm:ss' }}
    </p>
  }

</div>
