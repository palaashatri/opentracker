<div class="layer-panel" role="group" aria-label="Map layer visibility">

  <header class="panel-header">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="10" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="1" y="5" width="10" height="3" rx="1" fill="rgba(255,255,255,0.35)"/>
      <rect x="1" y="9" width="10" height="2" rx="1" fill="rgba(255,255,255,0.20)"/>
    </svg>
    <span class="panel-title">Layers</span>
  </header>

  <div class="layer-list">

    <!-- Flights layer -->
    <div class="layer-row" [class.layer-row--active]="showFlights">
      <div class="layer-meta">
        <span class="layer-indicator layer-indicator--flights" aria-hidden="true">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
            <path d="M1 8.5L4.5 5.5L5.5 3C5.5 3 6.5 1 8 1.5C9 2 8.5 3.5 8.5 3.5L7 5H10.5C10.5 5 12 4.5 12.5 5.5C13 6.5 11.5 7 11.5 7H7.5L6.5 8.5H9C9 8.5 10 8.5 10 9.5C10 10.5 9 10.5 9 10.5H4L2 10.5L1 8.5Z"
                  fill="currentColor"/>
          </svg>
        </span>
        <div class="layer-text">
          <span class="layer-name">Flights</span>
          <span class="layer-desc">Live aircraft positions</span>
        </div>
      </div>

      <label class="ios-toggle" [attr.aria-label]="'Toggle flights layer'">
        <input
          type="checkbox"
          [checked]="showFlights"
          (change)="toggle('flights', $event)"
          role="switch"
          [attr.aria-checked]="showFlights">
        <span class="ios-toggle__track">
          <span class="ios-toggle__thumb"></span>
        </span>
      </label>
    </div>

    <div class="layer-separator" aria-hidden="true"></div>

    <!-- Vessels layer -->
    <div class="layer-row" [class.layer-row--active]="showShips">
      <div class="layer-meta">
        <span class="layer-indicator layer-indicator--ships" aria-hidden="true">
          <svg width="14" height="12" viewBox="0 0 14 12" fill="none">
            <path d="M2 7L7 4L12 7V9C12 9.5 11.5 10 11 10H3C2.5 10 2 9.5 2 9V7Z" fill="currentColor" opacity="0.9"/>
            <path d="M5 4V2H9V4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="7" y1="1" x2="7" y2="2.5" stroke="currentColor" stroke-width="1.2"/>
            <path d="M0.5 10.5C2.5 12 4.5 10.5 7 10.5C9.5 10.5 11.5 12 13.5 10.5"
                  stroke="currentColor" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
          </svg>
        </span>
        <div class="layer-text">
          <span class="layer-name">Vessels</span>
          <span class="layer-desc">AIS ship tracking</span>
        </div>
      </div>

      <label class="ios-toggle ios-toggle--green" [attr.aria-label]="'Toggle vessels layer'">
        <input
          type="checkbox"
          [checked]="showShips"
          (change)="toggle('ships', $event)"
          role="switch"
          [attr.aria-checked]="showShips">
        <span class="ios-toggle__track">
          <span class="ios-toggle__thumb"></span>
        </span>
      </label>
    </div>

    <div class="layer-separator" aria-hidden="true"></div>

    <!-- Satellites layer -->
    <div class="layer-row" [class.layer-row--active]="showSatellites">
      <div class="layer-meta">
        <span class="layer-indicator layer-indicator--satellites" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <circle cx="7" cy="7" r="2.5" fill="currentColor"/>
            <line x1="7" y1="1" x2="7" y2="4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="7" y1="10" x2="7" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="1" y1="7" x2="4" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="10" y1="7" x2="13" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="2.5" y1="2.5" x2="4.5" y2="4.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
            <line x1="9.5" y1="9.5" x2="11.5" y2="11.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
          </svg>
        </span>
        <div class="layer-text">
          <span class="layer-name">Satellites</span>
          <span class="layer-desc">Orbital positions</span>
        </div>
      </div>

      <label class="ios-toggle ios-toggle--yellow" [attr.aria-label]="'Toggle satellites layer'">
        <input
          type="checkbox"
          [checked]="showSatellites"
          (change)="toggle('satellites', $event)"
          role="switch"
          [attr.aria-checked]="showSatellites">
        <span class="ios-toggle__track">
          <span class="ios-toggle__thumb"></span>
        </span>
      </label>
    </div>

  </div>
</div>
