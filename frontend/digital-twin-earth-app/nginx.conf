server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for all text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        image/svg+xml;

    # Angular SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;

        # Cache busting for index.html — never cache
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cesium static assets
    location /cesium/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API proxy → backend gateway
    location /api/ {
        proxy_pass         http://gateway:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_buffering            off;
        proxy_cache                off;
        proxy_set_header           Connection '';
        proxy_http_version         1.1;
        chunked_transfer_encoding  on;

        # Timeouts for long-lived SSE connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Health check endpoint
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
