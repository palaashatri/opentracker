name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (Java 17)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Grant gradlew execute permission
        run: chmod +x gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/digital-twin-earth-app/package-lock.json
      - name: Install dependencies
        run: cd frontend/digital-twin-earth-app && npm ci
      - name: Build
        run: cd frontend/digital-twin-earth-app && npm run build -- --configuration production
